[package]
name = "parlance"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
    "parlance-ast",
    "parlance-diagnostics",
    "parlance-ir",
    "parlance-runtime",
    "parlance-stdlib"
]

[dependencies]
parlance-ast = { path = "parlance-ast" }
parlance-diagnostics = { path = "parlance-diagnostics" }
parlance-ir = { path = "parlance-ir" }
parlance-runtime = { path = "parlance-runtime" }
parlance-stdlib = { path = "parlance-stdlib" }
